server:
  port: 8081

spring:
  application:
    name: javaweb
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      continue-on-error: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: internship-system-super-secret-key-change-me-2026-very-secure
  expiration: 86400000

file:
  upload-dir: ./uploads
  allowed-types: pdf,jpg,jpeg,png,doc,docx,xls,xlsx

app:
  init-admin:
    enabled: true
    username: admin
    password: 1234567
    real-name: 系统管理员

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html
